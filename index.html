<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Tracker</title>
    <link rel="shortcut icon" href="assets/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
</head>

<body class="dark">
    <div class="navbar">
        <div class="logo">Finance Tracker</div>
        <div class="theme"><button class="theme-toggle">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="light-mode">
                    <circle cx="12" cy="12" r="4"></circle>
                    <path d="M12 2v2"></path>
                    <path d="M12 20v2"></path>
                    <path d="m4.93 4.93 1.41 1.41"></path>
                    <path d="m17.66 17.66 1.41 1.41"></path>
                    <path d="M2 12h2"></path>
                    <path d="M20 12h2"></path>
                    <path d="m6.34 17.66-1.41 1.41"></path>
                    <path d="m19.07 4.93-1.41 1.41"></path>
                </svg>
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="dark-mode">
                    <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
                </svg>
            </button>
        </div>
    </div>
    <div class="container">
        <div class="userInput">
            <div style="font-size: 18px; font-weight: 600;">→ Current Balance: </div>
            <div class="currBalance">$0</div>
            <div class="entries">
                <div class="inputs">
                    <input type="text" placeholder="Description" class="desc">
                    <input type="number" placeholder="Amount" class="amount">
                    <input type="datetime-local" class="datetime">
                </div>
                <div class="dropdowns">
                    <label style="font-weight: 400; font-size: 20px;" for="type">Type:</label>
                    <select id="type" class="type">
                        <option value="income">Income</option>
                        <option value="expense">Expense</option>
                    </select>
                    <label style="font-weight: 400; font-size: 20px;" for="category">Category:</label>
                    <select id="category" class="category">
                        <option value="salary">Salary</option>
                        <option value="freelance">Freelance</option>
                        <option value="food">Food</option>
                        <option value="transport">Transport</option>
                        <option value="shopping">Shopping</option>
                        <option value="utilities">Utilities</option>
                        <option value="healthcare">Healthcare</option>
                        <option value="entertainment">Entertainment</option>
                        <option value="gifts">Gifts</option>
                        <option value="others">Others</option>
                    </select>
                </div>
                <div class="addInOut" style="display: flex; gap: 12px;">
                    <div><button class="addBtn">Add Transaction</button></div>
                    <div><button class="export">Export <span
                                style="font-size: 10px; padding-right: 5px;">.JSON</span>⤒</button></div>
                    <div><button class="import">Import <span
                                style="font-size: 10px; padding-right: 5px;">.JSON</span>⤓</button></div>
                </div>
            </div>
        </div>
        <div class="total">
            <div class="totalInOut">Total Income: <span class="income">$0</span></div>
            <div class="totalInOut">Total Expense: <span class="expense">$0</span></div>
        </div>
        <div class="makeFlex">
            <div class="data">Transaction Data</div>
            <div class="find_filter">
                <div class="search"><input type="text" placeholder="Search"></div>
                <div class="rwd_filter">
                    <label style="font-weight: 400; font-size: 20px;" for="filter">Filter:</label>
                    <select class="filter" id="filter">
                        <option value="all">All</option>
                        <option value="salary">Salary</option>
                        <option value="freelance">Freelance</option>
                        <option value="food">Food</option>
                        <option value="utilities">Utilities</option>
                        <option value="healthcare">Healthcare</option>
                        <option value="shopping">Shopping</option>
                        <option value="entertainment">Entertainment</option>
                        <option value="gifts">Gifts</option>
                        <option value="others">Others</option>
                    </select>
                </div>
            </div>
        </div>
        <div class="noData">
            No transaction data available
        </div>
        <div class="transactions">
            <div class="transactions-header">
                <div id="description">Description</div>
                <div id="amount">Amount</div>
                <div id="type">Type</div>
                <div id="category">Category</div>
                <div id="timestamps">Timestamps</div>
                <div id="actions">Actions</div>
            </div>
            <div class="transaction-list">

            </div>
        </div>
    </div>
</body>
<script src="script.js"></script>

</html>
